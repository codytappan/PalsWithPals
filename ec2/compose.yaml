# Palworld dedicated server, based on the upstream thijsvanloef example:
# https://github.com/thijsvanloef/palworld-server-docker
#
# The REST API (8212) is bound to localhost ONLY so it is never exposed to the
# internet. The world save lives on the mounted persistent data volume.
services:
  palworld:
    image: thijsvanloef/palworld-server-docker:latest
    container_name: palworld-server
    restart: unless-stopped
    ports:
      - "8211:8211/udp"   # game
      - "27015:27015/udp" # steam query
      - "127.0.0.1:8212:8212" # REST API - localhost only
    env_file:
      - .env
    environment:
      PLAYERS: "8"
      SERVER_PASSWORD: "${SERVER_PASSWORD}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      # --- Community server listing ---
      COMMUNITY: "true"
      SERVER_NAME: "${SERVER_NAME}"
      SERVER_DESCRIPTION: "${SERVER_DESCRIPTION}"
      PUBLIC_PORT: "8211"
      # --- Difficulty / family-friendly tuning ---
      DEATH_PENALTY: "None"           # no item loss on death
      FALL_DAMAGE_RATE: "0.500000"    # disable fall damage entirely
      PLAYER_STOMACH_DECREASE_RATE: "0.500000" # slower hunger depletion
      EQUIPMENT_DURABILITY_DAMAGE_RATE: "0.500000" # slower equipment decay
      BUILD_OBJECT_DETERIORATION_DAMAGE_RATE: "0.100000" # slower building decay
      REST_API_ENABLED: "true"
      REST_API_PORT: "8212"
      ENABLE_PLAYER_LOGGING: "true"
      RCON_ENABLED: "true"
      UPDATE_ON_BOOT: "true"
      BACKUP_ENABLED: "true"
      AUTO_PAUSE_ENABLED: "true"
      AUTO_PAUSE_TIMEOUT_EST: "180"
      DISCORD_WEBHOOK_URL: "${DISCORD_WEBHOOK_URL}"
      TZ: "${TZ}"
    volumes:
      - /opt/palworld/data/palworld:/palworld/
